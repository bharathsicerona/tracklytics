<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password – Tracklytics</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">🔑</div>
    <h1 class="auth-title">Set Your Password</h1>
    <p class="auth-subtitle">Choose a new password to get started.</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/set-password" class="auth-form">
      <div class="form-row">
        <label>New password</label>
        <input type="password" name="new_password" placeholder="At least 8 characters" required autofocus />
      </div>
      <div class="form-row">
        <label>Confirm password</label>
        <input type="password" name="confirm_password" placeholder="Repeat your password" required />
      </div>
      <button type="submit" class="btn btn-full">Set Password & Continue</button>
    </form>
  </div>
</body>
</html>
